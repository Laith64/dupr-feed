const tModal = document.getElementById("tournament-modal");
const tTitle = document.getElementById("t-title");
const tSubtitle = document.getElementById("t-subtitle");
const tLoading = document.getElementById("t-loading");
const tContent = document.getElementById("t-content");
const tTabContent = document.getElementById("t-tab-content");
let tournamentData = null;
let currentTTab = "standings";

window.openTournament = async function(eventName, playerIds) {
  tModal.classList.add("open");
  tTitle.textContent = eventName;
  tSubtitle.textContent = "Loading...";
  tLoading.style.display = "flex";
  tContent.style.display = "none";
  tournamentData = null;
  currentTTab = "standings";
  document.body.style.overflow = "hidden";

  try {
    const resp = await fetch("/api/tournament", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ eventName, playerIds })
    });
    const data = await resp.json();
    if (data.error) {
      tLoading.innerHTML = '<div style="color:var(--red)">' + esc(data.error) + '</div>';
      return;
    }
    tournamentData = data;
    const dateStr = data.eventDate ? new Date(data.eventDate + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "";
    const parts = [dateStr, data.venue, data.format, data.totalMatches + " matches"].filter(Boolean);
    tSubtitle.textContent = parts.join(" \u00B7 ");
    tLoading.style.display = "none";
    tContent.style.display = "block";
    // Reset tabs
    document.querySelectorAll(".t-tab").forEach(b => b.classList.remove("active"));
    document.querySelector('.t-tab[data-tab="standings"]').classList.add("active");
    renderTTab("standings");
  } catch (e) {
    tLoading.innerHTML = '<div style="color:var(--red)">Failed to load tournament data</div>';
  }
};

window.closeTournament = function() {
  tModal.classList.remove("open");
  document.body.style.overflow = "";
};

// Close modal on overlay click
tModal.addEventListener("click", function(e) {
  if (e.target === tModal) closeTournament();
});

// Tab switching
document.getElementById("t-tabs").addEventListener("click", function(e) {
  const tab = e.target.closest(".t-tab");
  if (!tab) return;
  document.querySelectorAll(".t-tab").forEach(b => b.classList.remove("active"));
  tab.classList.add("active");
  currentTTab = tab.dataset.tab;
  renderTTab(currentTTab);
});

function renderTTab(tab) {
  if (!tournamentData) return;
  if (tab === "standings") renderStandings();
  else if (tab === "matches") renderMatches();
  else if (tab === "upsets") renderUpsets();
}

function renderStandings() {
  const teams = tournamentData.teams || [];
  if (!teams.length) {
    tTabContent.innerHTML = '<div class="t-empty">No standings data</div>';
    return;
  }
  let html = '<table class="t-table"><thead><tr><th>#</th><th>Team</th><th>W</th><th>L</th><th>Win%</th><th>DUPR &Delta;</th><th>Avg Margin</th></tr></thead><tbody>';
  teams.forEach((t, i) => {
    const names = t.players.join(" &amp; ");
    const badge = i === 0 ? '<span class="t-badge-first">\uD83E\uDD47</span>' : '';
    const deltaClass = t.duprDelta > 0 ? "t-delta-pos" : t.duprDelta < 0 ? "t-delta-neg" : "";
    const deltaStr = t.duprDelta > 0 ? "+" + t.duprDelta.toFixed(4) : t.duprDelta.toFixed(4);
    const marginStr = t.avgMargin > 0 ? "+" + t.avgMargin : t.avgMargin;
    html += '<tr><td>' + (i+1) + '</td><td class="team-cell">' + names + badge + '</td><td>' + t.wins + '</td><td>' + t.losses + '</td><td>' + Math.round(t.winPct * 100) + '%</td><td class="' + deltaClass + '">' + deltaStr + '</td><td>' + marginStr + '</td></tr>';
  });
  html += '</tbody></table>';
  tTabContent.innerHTML = html;
}

function renderMatches() {
  const matches = tournamentData.matches || [];
  if (!matches.length) {
    tTabContent.innerHTML = '<div class="t-empty">No matches found</div>';
    return;
  }
  let html = '';
  for (const m of matches) {
    const teams = m.teams || [];
    if (teams.length < 2) continue;
    const date = m.eventDate ? new Date(m.eventDate + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "";
    const t1players = [teams[0].player1, teams[0].player2].filter(Boolean).map(p => p.fullName || "Unknown");
    const t2players = [teams[1].player1, teams[1].player2].filter(Boolean).map(p => p.fullName || "Unknown");
    const t1win = teams[0].winner === true;
    const t2win = teams[1].winner === true;
    // Build score from winner perspective
    const scores = [];
    for (let g = 1; g <= 5; g++) {
      const s1 = teams[0]["game" + g];
      const s2 = teams[1]["game" + g];
      if (s1 != null && s1 >= 0 && s2 != null && s2 >= 0) {
        scores.push(s1 + "-" + s2);
      }
    }
    html += '<div class="t-match">';
    html += '<div class="t-match-date">' + esc(date) + '</div>';
    html += '<div class="t-match-teams">';
    html += '<div class="t-match-team ' + (t1win ? "winner" : "loser") + '">' + esc(t1players.join(" & ")) + '</div>';
    html += '<div class="t-match-vs">vs</div>';
    html += '<div class="t-match-team ' + (t2win ? "winner" : "loser") + '">' + esc(t2players.join(" & ")) + '</div>';
    html += '<div class="t-match-score">' + esc(scores.join(", ")) + '</div>';
    html += '</div></div>';
  }
  tTabContent.innerHTML = html;
}

function renderUpsets() {
  const upsets = tournamentData.upsets || [];
  if (!upsets.length) {
    tTabContent.innerHTML = '<div class="t-empty">No upsets in this tournament</div>';
    return;
  }
  let html = '';
  for (const m of upsets) {
    const teams = m.teams || [];
    if (teams.length < 2) continue;
    const date = m.eventDate ? new Date(m.eventDate + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "";
    const t1players = [teams[0].player1, teams[0].player2].filter(Boolean).map(p => p.fullName || "Unknown");
    const t2players = [teams[1].player1, teams[1].player2].filter(Boolean).map(p => p.fullName || "Unknown");
    const t1win = teams[0].winner === true;
    const scores = [];
    for (let g = 1; g <= 5; g++) {
      const s1 = teams[0]["game" + g];
      const s2 = teams[1]["game" + g];
      if (s1 != null && s1 >= 0 && s2 != null && s2 >= 0) {
        scores.push(s1 + "-" + s2);
      }
    }
    const diff = m._ratingDiff || 0;
    html += '<div class="t-match">';
    html += '<div class="t-match-date">' + esc(date) + '</div>';
    html += '<div class="t-match-teams">';
    html += '<div class="t-match-team ' + (t1win ? "winner" : "loser") + '">' + esc(t1players.join(" & ")) + '</div>';
    html += '<div class="t-match-vs">vs</div>';
    html += '<div class="t-match-team ' + (!t1win ? "winner" : "loser") + '">' + esc(t2players.join(" & ")) + '</div>';
    html += '<div class="t-match-score">' + esc(scores.join(", ")) + '</div>';
    html += '</div>';
    html += '<div class="t-upset-label">' + diff.toFixed(3) + ' rating underdog</div>';
    html += '</div>';
  }
  tTabContent.innerHTML = html;
}

// ---- Player Profile ----
let profileStack = []; // [{id, name}]
let profileTabActive = "all";
const profileOverlay = document.getElementById("profile-overlay");

window.openPlayerProfile = function(id, name) {
  if (!id) return;
  profileStack.push({ id, name });
  _showProfileOverlay();
  _loadProfile(id, name);
};

window.openPlayerProfileByName = function openPlayerProfileByName(name, matchObj) {
  // Try to find the player ID from feed data or watches
  const all = {};
  for (const p of (feedData.players || [])) all[String(p.id)] = p;
  for (const w of watches) all[String(w.id)] = w;
  // Try searching by name
  for (const p of Object.values(all)) {
    if ((p.name || p.fullName || "").toLowerCase() === name.toLowerCase()) {
      openPlayerProfile(String(p.id), p.name || p.fullName || name);
      return;
    }
  }
  // If match object has teams, look through them
  if (matchObj && matchObj.teams) {
    for (const t of matchObj.teams) {
      for (const player of [t.player1, t.player2].filter(Boolean)) {
        if ((player.fullName || "").toLowerCase() === name.toLowerCase()) {
          openPlayerProfile(String(player.id), player.fullName || name);
          return;
        }
      }
    }
  }
  // Fallback: show profile with name but no ID — just alert for now
  alert("Can't find player ID for " + name + ". They may not be in your watch list.");
};

function _showProfileOverlay() {
  profileOverlay.classList.add("open");
  document.body.style.overflow = "hidden";
  document.getElementById("profile-back-btn").style.display = profileStack.length > 1 ? "inline-flex" : "none";
}

window.toggleProfileFollow = async function() {
  const btn = document.getElementById("profile-follow-btn");
  const player = btn._profilePlayer;
  if (!player) return;
  const isFollowed = watches.some(w => String(w.id) === String(player.id));
  btn.disabled = true;
  if (isFollowed) {
    await removeWatch(player.id);
  } else {
    await addWatch(player);
  }
  // Re-check state after update
  const nowFollowed = watches.some(w => String(w.id) === String(player.id));
  btn.textContent = nowFollowed ? "✓ Following" : "+ Follow";
  btn.className = "profile-follow-btn " + (nowFollowed ? "following" : "not-following");
  btn.disabled = false;
};

window.closeProfile = function() {
  profileOverlay.classList.remove("open");
  document.body.style.overflow = "";
  profileStack = [];
};

window.profileGoBack = function() {
  profileStack.pop();
  if (!profileStack.length) { closeProfile(); return; }
  const { id, name } = profileStack[profileStack.length - 1];
  document.getElementById("profile-back-btn").style.display = profileStack.length > 1 ? "inline-flex" : "none";
  _loadProfile(id, name);
};

async function _loadProfile(id, name) {
  // Update header immediately
  const avatarEl = document.getElementById("profile-avatar-lg");
  avatarEl.style.background = avatarColor(name || "?");
  avatarEl.innerHTML = initials(name || "?");
  document.getElementById("profile-name").textContent = name || "Loading...";
  document.getElementById("profile-subline").textContent = "";
  document.getElementById("profile-ratings").innerHTML = "";
  document.getElementById("profile-followers").style.display = "none";
  document.getElementById("profile-follow-btn").style.display = "none";
  const body = document.getElementById("profile-body");
  body.innerHTML = '<div class="loader" style="justify-content:center;padding:60px"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  profileTabActive = "all";

  try {
    const resp = await apiFetch("/api/player/" + encodeURIComponent(id));
    const data = await resp.json();
    if (data.error) { body.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${esc(data.error)}</p></div>`; return; }

    const p = data.player || {};
    const displayName = p.name || name || "Unknown";
    document.getElementById("profile-name").textContent = displayName;
    if (p.imageUrl) {
      avatarEl.innerHTML = `<img src="${esc(p.imageUrl)}" alt="${esc(displayName)}" onerror="this.parentNode.textContent='${initials(displayName)}';this.parentNode.style.background='${avatarColor(displayName)}'">`;
    }

    // Follow button
    const followBtn = document.getElementById("profile-follow-btn");
    const isFollowed = watches.some(w => String(w.id) === String(id));
    followBtn.textContent = isFollowed ? "✓ Following" : "+ Follow";
    followBtn.className = "profile-follow-btn " + (isFollowed ? "following" : "not-following");
    followBtn.style.display = "inline-block";
    followBtn._profilePlayer = { id, name: displayName, imageUrl: p.imageUrl || "",
      doublesRating: p.ratings?.doubles || null, singlesRating: p.ratings?.singles || null };

    // Subline: gender • age • location
    const subParts = [];
    if (p.gender) subParts.push(p.gender);
    if (p.age) subParts.push(p.age);
    if (p.location) subParts.push(p.location);
    const sublineEl = document.getElementById("profile-subline");
    sublineEl.textContent = subParts.join(" \u2022 ");

    // Follower counts — hidden
    document.getElementById("profile-followers").style.display = "none";

    // Ratings — styled like DUPR app
    const ratingsEl = document.getElementById("profile-ratings");
    const pills = [];
    const dr = p.ratings?.doubles, sr = p.ratings?.singles;
    if (dr) pills.push(`<div class="profile-rating-pill"><div class="profile-rating-type"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="opacity:.7"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><circle cx="12" cy="16" r="3"/></svg>Doubles</div><div class="profile-rating-val">${typeof dr==='number'?dr.toFixed(3):dr}</div></div>`);
    if (sr) pills.push(`<div class="profile-rating-pill"><div class="profile-rating-type"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="opacity:.7"><circle cx="12" cy="8" r="3"/><circle cx="12" cy="16" r="3"/></svg>Singles</div><div class="profile-rating-val">${typeof sr==='number'?sr.toFixed(3):sr}</div></div>`);
    ratingsEl.innerHTML = pills.join(`<div style="width:1px;background:var(--card-border);margin:0 8px;align-self:stretch"></div>`);

    _renderProfile(data, id);
  } catch(e) {
    if (e.message !== "unauthorized") body.innerHTML = `<div class="empty-state"><h3>Error loading profile</h3><p>${esc(e.message)}</p></div>`;
  }
}

function _renderProfile(data, profileId) {
  const s = data.stats || {};
  const allMatches = data.matches || [];
  const body = document.getElementById("profile-body");

  const statRows = [
    { lbl: "Wins", val: s.wins ?? 0 },
    { lbl: "Losses", val: s.losses ?? 0 },
    { lbl: "Avg Points", val: s.avgPointsPct != null ? s.avgPointsPct.toFixed(2) + "%" : "—" },
    { lbl: "Longest Win Streak", val: s.longestStreak ?? 0 },
    ...(s.singlesWins != null ? [{ lbl: "Singles Record", val: `${s.singlesWins}W · ${s.singlesLosses}L` }] : []),
    ...(s.doublesWins != null ? [{ lbl: "Doubles Record", val: `${s.doublesWins}W · ${s.doublesLosses}L` }] : []),
    ...(s.mixedWins != null && (s.mixedWins + s.mixedLosses) > 0 ? [{ lbl: "Mixed Record", val: `${s.mixedWins}W · ${s.mixedLosses}L` }] : []),
  ];

  const statsHtml = `
    <div class="profile-stats-list">
      ${statRows.map(st => `
        <div class="profile-stat-row-item">
          <span class="profile-stat-row-lbl">${st.lbl}</span>
          <span class="profile-stat-row-val">${esc(String(st.val))}</span>
        </div>`).join("")}
    </div>`;

  const commonHtml = `
    ${s.mostCommonPartner ? `<div class="profile-stat-row-item"><span class="profile-stat-row-lbl">Most Common Partner</span><span class="plink profile-stat-row-val" onclick="openPlayerProfileByName('${esc(s.mostCommonPartner)}',null)">${esc(s.mostCommonPartner)}</span></div>` : ""}
    ${s.mostCommonOpponent ? `<div class="profile-stat-row-item"><span class="profile-stat-row-lbl">Most Common Opp.</span><span class="plink profile-stat-row-val" onclick="openPlayerProfileByName('${esc(s.mostCommonOpponent)}',null)">${esc(s.mostCommonOpponent)}</span></div>` : ""}`;

  const tabsHtml = `
    <div class="profile-section-title">Matches</div>
    <div class="profile-tabs" id="profile-tabs">
      <button class="profile-tab active" data-ptab="all">All</button>
      <button class="profile-tab" data-ptab="singles">Singles</button>
      <button class="profile-tab" data-ptab="doubles">Doubles</button>
      <button class="profile-tab" data-ptab="mixed">Mixed</button>
    </div>
    <div id="profile-matches-body"></div>`;

  body.innerHTML = `<div class="profile-body-inner">
    <div class="profile-left-col">
      <div class="profile-section-title">Performance</div>
      ${statsHtml}${commonHtml}
    </div>
    <div class="profile-right-col">${tabsHtml}</div>
  </div>`;

  body.querySelectorAll(".profile-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      body.querySelectorAll(".profile-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      profileTabActive = btn.dataset.ptab;
      _renderProfileMatches(allMatches, profileId);
    });
  });

  _renderProfileMatches(allMatches, profileId);
}

function _renderProfileMatches(allMatches, profileId, page) {
  page = page || 1;
  const PERPAGE = 20;
  let filtered = allMatches;
  if (profileTabActive === "singles") filtered = allMatches.filter(m => { const en=(m.eventName||"").toUpperCase(),fmt=(m.eventFormat||"").toUpperCase(); return !en.includes("MIXED")&&!fmt.includes("MIXED")&&(fmt.includes("SINGLE")||(!fmt.includes("DOUBLE")&&en.includes("SINGLE"))); });
  if (profileTabActive === "doubles") filtered = allMatches.filter(m => { const en=(m.eventName||"").toUpperCase(),fmt=(m.eventFormat||"").toUpperCase(); return !en.includes("MIXED")&&!fmt.includes("MIXED")&&(fmt.includes("DOUBLE")||(fmt.includes("SINGLE")?false:en.includes("DOUBLE"))); });
  if (profileTabActive === "mixed") filtered = allMatches.filter(m => { const en=(m.eventName||"").toUpperCase(),fmt=(m.eventFormat||"").toUpperCase(); return en.includes("MIXED")||fmt.includes("MIXED"); });

  const totalPages = Math.max(1, Math.ceil(filtered.length / PERPAGE));
  page = Math.min(Math.max(1, page), totalPages);
  const pageMatches = filtered.slice((page - 1) * PERPAGE, page * PERPAGE);

  const mbody = document.getElementById("profile-matches-body");
  if (!mbody) return;

  if (!pageMatches.length) {
    mbody.innerHTML = '<div class="h2h-empty">No matches found.</div>';
    return;
  }

  let html = pageMatches.map((m) => {
    const pid = String(profileId);
    const teams = m.teams || [];
    let won = null, opps = [], mates = [], scoreStr = "", ratingDelta = null;
    for (let ti = 0; ti < teams.length; ti++) {
      const t = teams[ti];
      const players = [t.player1, t.player2].filter(Boolean);
      for (let pi = 0; pi < players.length; pi++) {
        if (String(players[pi].id) === pid) {
          won = t.winner === true;
          const otherIdx = ti === 0 ? 1 : 0;
          const oppTeam = teams[otherIdx] || {};
          opps = [oppTeam.player1, oppTeam.player2].filter(Boolean).map(p => ({ id: String(p.id||""), name: p.fullName || "Unknown" }));
          mates = players.filter(p => String(p.id) !== pid).map(p => ({ id: String(p.id||""), name: p.fullName || "Unknown" }));
          // Score
          const myT = teams[ti], oppT = teams[otherIdx] || {};
          const gs = [];
          for (let g = 1; g <= 5; g++) { const s1=myT["game"+g],s2=oppT["game"+g]; if(s1!=null&&s1>=0&&s2!=null&&s2>=0) gs.push(s1+"-"+s2); }
          scoreStr = gs.join(", ");
          // Rating delta
          const rim = t.preMatchRatingAndImpact || {};
          const fmt = (m.eventFormat||"").toUpperCase();
          const enUp = (m.eventName||"").toUpperCase();
          const isDbls = enUp.includes("MIXED") || fmt.includes("DOUBLE") || (fmt.includes("SINGLE") ? false : enUp.includes("DOUBLE"));
          if (isDbls) {
            const imp = rim[`matchDoubleRatingImpactPlayer${pi+1}`];
            if (imp != null) ratingDelta = parseFloat((+imp).toFixed(3));
          } else {
            const imp = rim[`matchSingleRatingImpactPlayer${pi+1}`];
            if (imp != null) ratingDelta = parseFloat((+imp).toFixed(3));
          }
          break;
        }
      }
    }
    const en = m.eventName || m.league || "";
    const fmt = (m.eventFormat || "").toUpperCase();
    const isMixed = en.toUpperCase().includes("MIXED") || fmt.includes("MIXED");
    const isDoubles = !isMixed && (fmt.includes("SINGLE") ? false : fmt.includes("DOUBLE") || en.toUpperCase().includes("DOUBLE"));
    const typeLbl = isMixed ? "mixed" : isDoubles ? "doubles" : "singles";
    const typeCls = isMixed ? "badge-mixed" : "badge-type";
    const wLbl = won === true ? '<span class="badge badge-win">W</span>' : won === false ? '<span class="badge badge-loss">L</span>' : "";
    const delta = ratingDelta != null && ratingDelta !== 0 ? `<span style="font-size:11px;${ratingDelta>0?"color:var(--green)":"color:var(--red)"}">${ratingDelta>0?"+":""}${ratingDelta}</span>` : "";
    const oppStr = opps.map(o => `<span class="plink" onclick="openPlayerProfile('${esc(o.id)}','${esc(o.name)}')">${esc(o.name)}</span>`).join(" &amp; ") || "Unknown";
    const mateStr = mates.length ? ` <span style="color:var(--text2);font-size:12px">w/ ${mates.map(o=>`<span class="plink" onclick="openPlayerProfile('${esc(o.id)}','${esc(o.name)}')">${esc(o.name)}</span>`).join(" &amp; ")}</span>` : "";
    const d = m.eventDate || m.matchDate || "";
    const dStr = d ? new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "";
    const allPids = teams.flatMap(t=>[t.player1,t.player2].filter(Boolean).map(p=>p.id));
    return `<div class="profile-match">
      <div class="profile-match-meta">
        <span class="profile-match-event" data-event="${esc(en)}" data-pids="${esc(JSON.stringify(allPids))}">${esc(en)}</span>
        <span style="display:flex;gap:6px;align-items:center">${wLbl}<span class="badge ${typeCls}" style="font-size:10px;padding:2px 7px">${typeLbl}</span><span class="profile-match-date">${esc(dStr)}</span></span>
      </div>
      <div class="profile-match-body">
        <div>vs ${oppStr}${mateStr} ${delta}</div>
        ${scoreStr ? `<div class="profile-match-score">${esc(scoreStr)}</div>` : ""}
      </div>
    </div>`;
  }).join("");

  if (totalPages > 1) {
    html += `<div class="profile-pagination">
      <button class="profile-page-btn" id="pp-prev" ${page<=1?"disabled":""}>&#8592; Prev</button>
      <span style="color:var(--text2);font-size:13px">Page ${page} of ${totalPages} &nbsp;·&nbsp; ${filtered.length} matches</span>
      <button class="profile-page-btn" id="pp-next" ${page>=totalPages?"disabled":""}>Next &#8594;</button>
    </div>`;
  }

  mbody.innerHTML = html;

  mbody.querySelectorAll(".profile-match-event[data-event]").forEach(el => {
    el.addEventListener("click", () => {
      const pids = JSON.parse(el.dataset.pids || "[]");
      window.openTournament(el.dataset.event, pids);
    });
  });

  if (totalPages > 1) {
    const prev = mbody.querySelector("#pp-prev");
    const next = mbody.querySelector("#pp-next");
    if (prev) prev.addEventListener("click", () => _renderProfileMatches(allMatches, profileId, page - 1));
    if (next) next.addEventListener("click", () => _renderProfileMatches(allMatches, profileId, page + 1));
  }
}

// ---- Mini Popup ----
let _miniPopupPlayer = null;
const miniPopup = document.getElementById("mini-popup");

window.openMiniPopup = async function(id, name, evt) {
  evt && evt.stopPropagation();
  if (!id && !name) return;

  // Position popup near click
  if (evt) {
    const x = evt.clientX, y = evt.clientY;
    const popW = 260, popH = 200;
    miniPopup.style.left = Math.min(x, window.innerWidth - popW - 10) + "px";
    miniPopup.style.top = Math.min(y + 10, window.innerHeight - popH - 10) + "px";
  }

  document.getElementById("mini-popup-name").textContent = name || "Loading...";
  document.getElementById("mini-popup-ratings").innerHTML = "";
  document.getElementById("mini-popup-stats").innerHTML = '<span style="color:var(--text2)">Loading...</span>';
  document.getElementById("mini-popup-recent").innerHTML = "";
  miniPopup.classList.add("open");
  _miniPopupPlayer = { id, name };

  document.getElementById("mini-popup-open-btn").onclick = () => {
    closeMiniPopup();
    openPlayerProfile(id, name);
  };

  const followBtn = document.getElementById("mini-popup-follow-btn");
  function _updateMiniFollowBtn() {
    const isFollowed = watches.some(w => String(w.id) === String(id));
    followBtn.textContent = isFollowed ? "✓ Following" : "+ Follow";
    followBtn.style.color = isFollowed ? "var(--green)" : "";
  }
  _updateMiniFollowBtn();
  followBtn.onclick = async () => {
    const isFollowed = watches.some(w => String(w.id) === String(id));
    if (isFollowed) {
      await removeWatch(id);
    } else {
      const p = _miniPopupPlayer || {};
      await addWatch({ id, name, imageUrl: p.imageUrl || "", doublesRating: p.doublesRating || null, singlesRating: p.singlesRating || null });
    }
    _updateMiniFollowBtn();
  };

  if (!id) { document.getElementById("mini-popup-stats").innerHTML = '<span style="color:var(--text2)">No ID available</span>'; return; }

  try {
    const resp = await apiFetch("/api/player/" + encodeURIComponent(id));
    const data = await resp.json();
    if (data.error) { document.getElementById("mini-popup-stats").textContent = data.error; return; }
    const p = data.player || {}, s = data.stats || {};
    _miniPopupPlayer = { id, name: p.name || name, imageUrl: p.imageUrl || "", doublesRating: p.ratings?.doubles || null, singlesRating: p.ratings?.singles || null };
    document.getElementById("mini-popup-name").textContent = p.name || name || "Unknown";
    const rPills = [];
    const msr = p.ratings?.singles, mdr = p.ratings?.doubles;
    if (msr) rPills.push(`<span class="mini-popup-rating">S: ${typeof msr==='number'?msr.toFixed(3):msr}</span>`);
    if (mdr) rPills.push(`<span class="mini-popup-rating">D: ${typeof mdr==='number'?mdr.toFixed(3):mdr}</span>`);
    document.getElementById("mini-popup-ratings").innerHTML = rPills.join("");
    document.getElementById("mini-popup-stats").innerHTML =
      `<span style="color:var(--green)">${s.wins||0}W</span> <span style="color:var(--red)">${s.losses||0}L</span> <span style="color:var(--text2)">${s.winPct!=null?Math.round(s.winPct)+"% win rate":""}</span>`;
    // Last 5 matches short list
    const last5 = (data.matches || []).slice(0, 5);
    document.getElementById("mini-popup-recent").innerHTML = last5.map(m => {
      const teams = m.teams || [];
      for (const t of teams) {
        for (const pl of [t.player1, t.player2].filter(Boolean)) {
          if (String(pl.id) === String(id)) {
            const won = t.winner;
            const d = m.eventDate ? new Date(m.eventDate).toLocaleDateString("en-US",{month:"short",day:"numeric"}) : "";
            return `<span style="color:${won?"var(--green)":"var(--red)"}">${won?"W":"L"}</span> ${esc(m.eventName||"")} <span style="opacity:.5">${d}</span><br>`;
          }
        }
      }
      return "";
    }).join("");
  } catch(e) {
    if (e.message !== "unauthorized") document.getElementById("mini-popup-stats").textContent = "Error loading";
  }
};

window.closeMiniPopup = function() {
  miniPopup.classList.remove("open");
};

// Close mini popup on outside click
document.addEventListener("click", (e) => {
  if (miniPopup.classList.contains("open") && !miniPopup.contains(e.target)) {
    closeMiniPopup();
  }
});
